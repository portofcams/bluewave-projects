<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1326"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="42%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(1100,0)"/>
  </g>

  <!-- eyebrow -->
  <text x="100" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="6" fill="#38bdf8" opacity="0.9">BLUEWAVE PROJECTS · BOOKED DIRECT</text>

  <!-- title line 1 -->
  <text x="100" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="white">Get found on Google.</text>
  <!-- title line 2 (gradient) -->
  <text x="100" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="url(#title-grad)">Get booked direct.</text>

  <!-- subtitle -->
  <text x="100" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="white" opacity="0.55">Local search visibility for Hawai&#x2BB;i ocean-tour operators.</text>
  <text x="100" y="492" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="white" opacity="0.55">58% are invisible on the searches their customers type.</text>

  <!-- wave decoration -->
  <path d="M0 545 Q150 505 300 535 T600 525 T900 535 T1200 515 L1200 630 L0 630 Z" fill="url(#wave-grad2)"/>
  <path d="M0 560 Q150 530 300 550 T600 540 T900 555 T1200 535" fill="none" stroke="url(#wave-grad)" stroke-width="2"/>
</svg>
